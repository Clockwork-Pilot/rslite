name: Check Constraints

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  image-digest:
    uses: ./.github/workflows/image-digest.yml

  check-constraints:
    needs: [image-digest]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rslite
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # No ghcr.io login needed: ghcr.io/clockwork-pilot/rslite-ws is a public package.
      # If it's ever made private again, re-add a docker login step with a PAT.

      - name: Cache Docker image
        id: cache-image
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: /tmp/rslite-ws.tar
          key: docker-rslite-ws-${{ needs.image-digest.outputs.digest }}

      - name: Load cached image
        if: steps.cache-image.outputs.cache-hit == 'true'
        env:
          AGENT_IMAGE: ${{ needs.image-digest.outputs.image }}
        run: |
          set -e
          if [ ! -f /tmp/rslite-ws.tar ]; then
            echo "::error::Cache hit reported but /tmp/rslite-ws.tar not found"
            exit 1
          fi
          docker load < /tmp/rslite-ws.tar

      - name: Pull image and save to cache
        if: steps.cache-image.outputs.cache-hit != 'true'
        env:
          AGENT_IMAGE: ${{ needs.image-digest.outputs.image }}
        run: |
          set -e
          docker pull "$AGENT_IMAGE"
          docker save "$AGENT_IMAGE" > /tmp/rslite-ws.tar

      - name: Run constraint checks
        id: constraints
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          AGENT_IMAGE: ${{ needs.image-digest.outputs.image }}
        run: |
          echo "::group::Constraint Checks"
          bash ${{ github.workspace }}/.github/scripts/run-in-docker-no-claude.sh \
            "check_spec_constraints.py || { \
              echo '--- Spec checks results ---'; \
              cat /workspace/spec-checks.k.md; \
              echo '--- testrunner failures ---'; \
              grep 'errors out of' /sqlite/testrunner.log 2>/dev/null | grep -v '^0 errors' || echo '(no testrunner.log failures found)'; exit 1; }" || {
            echo "::error::Constraint checks failed"
            exit 1
          }
          echo "::endgroup::"
